<!DOCTYPE html>
<html>
<head>
  <title>Snake Ultra</title>

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle, #0f172a, #000);
      font-family: Arial;
      color: white;
      overflow: hidden;
    }

    .hud {
      position: absolute;
      top: 10px;
      width: 100%;
      display: flex;
      justify-content: space-around;
      font-size: 18px;
      z-index: 2;
    }

    canvas {
      display: block;
      background: #000;
      touch-action: none;
    }

    .controls {
      position: absolute;
      bottom: 20px;
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .pad {
      display: grid;
      grid-template-columns: repeat(3, 70px);
      grid-template-rows: repeat(3, 70px);
      gap: 10px;
    }

    .btn {
      background: rgba(0,255,200,0.15);
      border: 1px solid rgba(0,255,200,0.4);
      border-radius: 15px;
      font-size: 24px;
      color: #00ffcc;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 15px rgba(0,255,200,0.3);
    }

    .btn:active {
      transform: scale(0.9);
      box-shadow: 0 0 25px #00ffcc;
    }
  </style>
</head>

<body>

<div class="hud">
  <div id="score">Score: 0</div>
  <div id="high">High: 0</div>
</div>

<canvas id="game"></canvas>

<div class="controls">
  <div class="pad">
    <div></div>
    <button class="btn" onclick="moveUp()">⬆️</button>
    <div></div>

    <button class="btn" onclick="moveLeft()">⬅️</button>
    <button class="btn" onclick="moveDown()">⬇️</button>
    <button class="btn" onclick="moveRight()">➡️</button>

    <div></div>
    <div></div>
    <div></div>
  </div>
</div>

<script>
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

// grid
let grid = 15;

// snake
let snake = [{x: 150, y: 150}];
let dx = grid;
let dy = 0;

// score
let score = 0;
let highScore = localStorage.getItem("highScore") || 0;

// food
let food = spawnFood();

// special food
let foodCount = 0;
let specialFood = null;
let specialTimer = 0;

// particles
let particles = [];

let gameOver = false;

// speed
let speed = 120;
let interval = setInterval(draw, speed);

// controls (keyboard)
document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight" && dx === 0) { dx = grid; dy = 0; }
  if (e.key === "ArrowLeft" && dx === 0) { dx = -grid; dy = 0; }
  if (e.key === "ArrowUp" && dy === 0) { dx = 0; dy = -grid; }
  if (e.key === "ArrowDown" && dy === 0) { dx = 0; dy = grid; }
  if (e.key === "r" || e.key === "R") restartGame();
});

// mobile buttons
function moveUp() { if (dy === 0) { dx = 0; dy = -grid; } }
function moveDown() { if (dy === 0) { dx = 0; dy = grid; } }
function moveLeft() { if (dx === 0) { dx = -grid; dy = 0; } }
function moveRight() { if (dx === 0) { dx = grid; dy = 0; } }

// restart
function restartGame() {
  snake = [{x: 150, y: 150}];
  dx = grid;
  dy = 0;
  score = 0;
  gameOver = false;
  particles = [];
  specialFood = null;
  foodCount = 0;
}

// spawn food
function spawnFood() {
  return {
    x: Math.floor(Math.random() * (canvas.width / grid)) * grid,
    y: Math.floor(Math.random() * (canvas.height / grid)) * grid
  };
}

// particles
function createParticles(x, y) {
  for (let i = 0; i < 10; i++) {
    particles.push({
      x, y,
      dx: (Math.random() - 0.5) * 4,
      dy: (Math.random() - 0.5) * 4,
      life: 20
    });
  }
}

function drawParticles() {
  particles.forEach((p, i) => {
    ctx.fillStyle = "orange";
    ctx.fillRect(p.x, p.y, 3, 3);
    p.x += p.dx;
    p.y += p.dy;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  });
}

function draw() {
  if (gameOver) {
    ctx.fillStyle = "white";
    ctx.font = "30px Arial";
    ctx.fillText("GAME OVER", canvas.width/2 - 90, canvas.height/2);
    ctx.fillText("Press R", canvas.width/2 - 60, canvas.height/2 + 40);
    return;
  }

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  let head = {
    x: snake[0].x + dx,
    y: snake[0].y + dy
  };

  // wrap
  if (head.x >= canvas.width) head.x = 0;
  if (head.x < 0) head.x = canvas.width - grid;
  if (head.y >= canvas.height) head.y = 0;
  if (head.y < 0) head.y = canvas.height - grid;

  // self collision
  for (let part of snake) {
    if (head.x === part.x && head.y === part.y) {
      gameOver = true;
      if (score > highScore) {
        highScore = score;
        localStorage.setItem("highScore", highScore);
      }
    }
  }

  snake.unshift(head);

  // eat normal
  if (head.x === food.x && head.y === food.y) {
    score++;
    foodCount++;
    createParticles(food.x, food.y);

    if (foodCount % 5 === 0) {
      specialFood = spawnFood();
      specialTimer = Date.now();
    }

    food = spawnFood();
  } else {
    snake.pop();
  }

  // eat special
  if (specialFood && head.x === specialFood.x && head.y === specialFood.y) {
    score += 5;
    createParticles(specialFood.x, specialFood.y);
    specialFood = null;
  }

  // special timer
  if (specialFood && Date.now() - specialTimer > 5000) {
    specialFood = null;
  }

  // snake draw
  snake.forEach((part, i) => {
    ctx.shadowBlur = 15;
    ctx.shadowColor = "#00ffcc";
    ctx.fillStyle = i === 0 ? "#00ffcc" : "#00cc99";
    ctx.fillRect(part.x, part.y, grid, grid);
    ctx.shadowBlur = 0;
  });

  // normal food
  ctx.beginPath();
  ctx.fillStyle = "#ff3b3b";
  ctx.arc(food.x + grid/2, food.y + grid/2, grid/2, 0, Math.PI*2);
  ctx.fill();

  // special (grape style 🍇)
  if (specialFood) {
    ctx.shadowBlur = 15;
    ctx.shadowColor = "#6a5acd";

    for (let i = 0; i < 4; i++) {
      ctx.beginPath();
      ctx.fillStyle = "#7b68ee";
      ctx.arc(
        specialFood.x + grid/2 + (i%2)*6,
        specialFood.y + grid/2 + Math.floor(i/2)*6,
        4,
        0,
        Math.PI*2
      );
      ctx.fill();
    }

    ctx.shadowBlur = 0;
  }

  drawParticles();

  // HUD update
  document.getElementById("score").innerText = "Score: " + score;
  document.getElementById("high").innerText = "High: " + highScore;
}
</script>

</body>
</html>
