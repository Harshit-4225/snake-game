<!DOCTYPE html>
<html>
<head>
  <title>Snake Ultra</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle, #1a1a2e, #000);
      font-family: Arial;
      color: white;
    }

    .game-container {
      text-align: center;
      background: #111;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 0 25px rgba(0,255,200,0.2);
    }

    canvas {
      border: 2px solid #444;
      border-radius: 10px;
      background: #000;
      display: block;
      margin: auto;
      touch-action: none;
    }

    select {
      margin-top: 10px;
      padding: 5px;
      border-radius: 5px;
      border: none;
    }
  </style>
</head>

<body>

<div class="game-container">
  <h1>🐍 Snake Ultra 🍇</h1>

  <canvas id="game" width="400" height="400"></canvas>

  <div>
    Speed:
    <select id="speedControl">
      <option value="220">Slow</option>
      <option value="160" selected>Normal</option>
      <option value="100">Fast</option>
      <option value="60">Insane</option>
    </select>
  </div>

  <p>Arrow keys / Swipe • R to restart</p>
</div>

<script>
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

let grid = 10;

let snake = [{x: 200, y: 200}];
let dx = grid;
let dy = 0;

let score = 0;
let highScore = localStorage.getItem("highScore") || 0;

let gameOver = false;

let particles = [];

// speed
let speed = 160;
let interval;

function startLoop(){
  clearInterval(interval);
  interval = setInterval(draw, speed);
}
startLoop();

// speed control
document.getElementById("speedControl").addEventListener("change", function(e) {
  speed = parseInt(e.target.value);
  startLoop();
});

// 🍎 food
function randomFood(){
  return {
    x: Math.floor(Math.random() * (canvas.width / grid)) * grid,
    y: Math.floor(Math.random() * (canvas.height / grid)) * grid
  };
}

let food = randomFood();

// 🍇 special
let foodCount = 0;
let specialFood = null;
let specialTimer = 0;

// keyboard
document.addEventListener("keydown", function(event) {
  if (event.key === "ArrowRight" && dx === 0) { dx = grid; dy = 0; }
  if (event.key === "ArrowLeft" && dx === 0) { dx = -grid; dy = 0; }
  if (event.key === "ArrowUp" && dy === 0) { dx = 0; dy = -grid; }
  if (event.key === "ArrowDown" && dy === 0) { dx = 0; dy = grid; }

  if (event.key === "r" || event.key === "R") restartGame();
});

// 📱 touch swipe
let touchStartX = 0;
let touchStartY = 0;

canvas.addEventListener("touchstart", e=>{
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
});

canvas.addEventListener("touchend", e=>{
  let dxSwipe = e.changedTouches[0].clientX - touchStartX;
  let dySwipe = e.changedTouches[0].clientY - touchStartY;

  if(Math.abs(dxSwipe) > Math.abs(dySwipe)){
    if(dxSwipe > 0 && dx===0){ dx=grid; dy=0; }
    else if(dxSwipe < 0 && dx===0){ dx=-grid; dy=0; }
  } else {
    if(dySwipe > 0 && dy===0){ dx=0; dy=grid; }
    else if(dySwipe < 0 && dy===0){ dx=0; dy=-grid; }
  }
});

// restart
function restartGame(){
  snake = [{x:200,y:200}];
  dx = grid; dy = 0;
  score = 0;
  gameOver = false;
  particles = [];
  specialFood = null;
  foodCount = 0;
  food = randomFood();
}

// particles
function createParticles(x,y){
  for(let i=0;i<10;i++){
    particles.push({
      x,y,
      dx:(Math.random()-0.5)*4,
      dy:(Math.random()-0.5)*4,
      life:20
    });
  }
}

function drawParticles(){
  particles.forEach((p,i)=>{
    ctx.fillStyle="orange";
    ctx.fillRect(p.x,p.y,3,3);
    p.x+=p.dx;
    p.y+=p.dy;
    p.life--;
    if(p.life<=0) particles.splice(i,1);
  });
}

// 🍇 grapes
function drawGrapes(x,y){
  let r = grid/3;

  function grape(cx,cy){
    let grad = ctx.createRadialGradient(cx-r/3,cy-r/3,1,cx,cy,r);
    grad.addColorStop(0,"#d580ff");
    grad.addColorStop(1,"#5a00a3");

    ctx.fillStyle=grad;
    ctx.beginPath();
    ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle="rgba(255,255,255,0.6)";
    ctx.beginPath();
    ctx.arc(cx-r/3,cy-r/3,r/4,0,Math.PI*2);
    ctx.fill();
  }

  grape(x+grid*0.5,y+grid*0.3);
  grape(x+grid*0.3,y+grid*0.6);
  grape(x+grid*0.7,y+grid*0.6);
  grape(x+grid*0.5,y+grid*0.9);

  ctx.strokeStyle="#66cc66";
  ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(x+grid*0.5,y+grid*0.2);
  ctx.lineTo(x+grid*0.5,y);
  ctx.stroke();
}

// draw
function draw(){

  if(gameOver){
    ctx.fillStyle="white";
    ctx.font="30px Arial";
    ctx.fillText("GAME OVER 💀",80,200);
    ctx.fillText("Press R",120,240);
    return;
  }

  ctx.clearRect(0,0,canvas.width,canvas.height);

  let head = {x:snake[0].x+dx, y:snake[0].y+dy};

  // wrap
  if(head.x>=canvas.width) head.x=0;
  if(head.x<0) head.x=canvas.width-grid;
  if(head.y>=canvas.height) head.y=0;
  if(head.y<0) head.y=canvas.height-grid;

  // self hit
  for(let i=1;i<snake.length;i++){
    if(head.x===snake[i].x && head.y===snake[i].y){
      gameOver=true;
      if(score>highScore){
        highScore=score;
        localStorage.setItem("highScore",highScore);
      }
    }
  }

  snake.unshift(head);

  // normal food
  if(head.x===food.x && head.y===food.y){
    score++;
    foodCount++;
    createParticles(food.x,food.y);

    if(foodCount%5===0){
      specialFood=randomFood();
      specialTimer=Date.now();
    }

    food=randomFood();
  } else {
    snake.pop();
  }

  // grapes
  if(specialFood){
    if(head.x===specialFood.x && head.y===specialFood.y){
      score+=5;
      createParticles(specialFood.x,specialFood.y);
      specialFood=null;
    }

    if(Date.now()-specialTimer>5000){
      specialFood=null;
    }
  }

  // snake
  snake.forEach((p,i)=>{
    ctx.shadowBlur=15;
    ctx.shadowColor="#00ffcc";

    ctx.fillStyle=i===0?"#00ffcc":"#00cc99";
    ctx.fillRect(p.x,p.y,grid,grid);

    ctx.shadowBlur=0;

    if(i===0){
      ctx.fillStyle="black";
      ctx.fillRect(p.x+2,p.y+2,3,3);
      ctx.fillRect(p.x+6,p.y+2,3,3);
    }
  });

  // normal food
  ctx.beginPath();
  ctx.fillStyle="#ff3b3b";
  ctx.arc(food.x+grid/2,food.y+grid/2,grid/2,0,Math.PI*2);
  ctx.fill();

  // grapes draw
  if(specialFood){
    drawGrapes(specialFood.x,specialFood.y);
  }

  drawParticles();

  // score
  ctx.fillStyle="white";
  ctx.font="16px Arial";
  ctx.fillText("Score: "+score,10,20);
  ctx.fillText("High: "+highScore,10,40);
}
</script>

</body>
</html>
